# ═══════════════════════════════════════════════════
#  Argo Maps — Full Stack Docker Compose
#  One command to rule them all: docker compose up
# ═══════════════════════════════════════════════════
#
#  Services:
#    • argo-frontend  → Next.js (port 3000)
#    • argo-search    → Go Fuzzy Search API (port 4000)
#    • argo-spatial   → Rust K-D Tree Engine (port 4002)
#    • argo-martin    → MapLibre Tile Server (port 3100)
#    • argo-nginx     → Reverse Proxy + CORS (port 8080)
#
#  Usage:
#    cd infrastructure && docker compose up -d
#

services:

  # ─── Go: Fuzzy Search API (Levenshtein) ───
  search-api:
    build:
      context: ../backend/search-api
      dockerfile: Dockerfile
    container_name: argo-search
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/search?q=test"]
      interval: 10s
      timeout: 3s

  # ─── Rust: Spatial Engine (K-D Tree) ───
  spatial-engine:
    build:
      context: ../backend/spatial-engine
      dockerfile: Dockerfile
    container_name: argo-spatial
    ports:
      - "4002:4002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 10s
      timeout: 3s

  # ─── Martin: serves PMTiles and PostGIS ───
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: argo-martin
    environment:
      - DATABASE_URL=postgresql://argo:argomaps@postgis:5432/osm
    ports:
      - "3100:3000"
    volumes:
      - ./tiles:/tiles
    command: ["--dir", "/tiles"]
    depends_on:
      - postgis
    restart: unless-stopped

  # ─── Nginx: Reverse proxy with CORS & caching ───
  nginx:
    image: nginx:alpine
    container_name: argo-nginx
    depends_on:
      martin:
        condition: service_started
      search-api:
        condition: service_healthy
      spatial-engine:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped

  # ─── PostGIS: Vector Map Database ───
  postgis:
    image: postgis/postgis:15-3.3
    container_name: argo-postgis
    environment:
      - POSTGRES_USER=argo
      - POSTGRES_PASSWORD=argomaps
      - POSTGRES_DB=osm
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── Go: Transit Socket API ───
  transit-socket:
    build:
      context: ../backend/transit-socket
      dockerfile: Dockerfile
    container_name: argo-transit
    ports:
      - "4001:4001"
    restart: unless-stopped

volumes:
  pg_data:
