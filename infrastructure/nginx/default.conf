# Argo Maps — Production Nginx Reverse Proxy
# Centralizes Next.js, Go (Search), Rust (Spatial), and Martin (Tiles).

limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=100r/s;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s;

    # Gzip Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;

    # ── Next.js Frontend ──
    location / {
        set $nextjs http://host.docker.internal:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Go Search API ──
    location /api/search {
        limit_req zone=search_limit burst=50 nodelay;
        set $goapi http://argo-search:4000;
        proxy_pass $goapi;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── Rust Spatial Engine ──
    location /api/spatial/ {
        limit_req zone=search_limit burst=30 nodelay;
        rewrite ^/api/spatial/(.*)$ /api/$1 break;
        set $rustapi http://argo-spatial:4002;
        proxy_pass $rustapi;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── Martin Tile Server ──
    location /tiles/ {
        limit_req zone=tile_limit burst=500 nodelay;
        set $martin http://argo-martin:3000;
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass $martin;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
    }

    # ── Health check ──
    location /health {
        return 200 '{"status":"ok","service":"argo-maps"}';
        add_header Content-Type application/json;
    }
}
