# Argo Maps — Nginx Reverse Proxy
# Simpler config that handles Martin availability gracefully

server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS resolver
    resolver 127.0.0.11 valid=10s;

    # ── Tile endpoint ──
    location /tiles/ {
        set $upstream http://argo-martin:3000;
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass $upstream;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ── Martin catalog (debug) ──
    location /catalog {
        set $upstream http://argo-martin:3000;
        proxy_pass $upstream/catalog;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── Health check ──
    location /health {
        return 200 '{"status":"ok","service":"argo-maps"}';
        add_header Content-Type application/json;
    }
}
