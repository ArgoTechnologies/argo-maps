# Argo Maps — Production Nginx Reverse Proxy
# Centralizes Next.js, Go (Search), Rust (Spatial), and Martin (Tiles).

limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=100r/s;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s;

    # Gzip Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;

    # ── Next.js Frontend is handled natively on port 3000 ──

    # ── Go Search API ──
    location /api/search {
        limit_req zone=search_limit burst=50 nodelay;
        proxy_pass http://search-api:4000;
    }

    # ── Rust Spatial Engine ──
    location /api/spatial/ {
        limit_req zone=search_limit burst=30 nodelay;
        rewrite ^/api/spatial/(.*)$ /api/$1 break;
        proxy_pass http://spatial-engine:4002;
    }

    # ── Martin Tile Server ──
    location /tiles/ {
        limit_req zone=tile_limit burst=500 nodelay;
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass http://martin:3000;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
    }

    # ── Health check ──
    location /health {
        return 200 '{"status":"ok","service":"argo-maps"}';
        add_header Content-Type application/json;
    }
}
